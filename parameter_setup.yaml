common:

  basedir: "/Users/evanzhang/zzq@umd.edu - Google Drive/My Drive/Research"
  # basedir: "H:/My Drive/Research"

  datadir_subpaths:
    - "SharpSSPy"
    - "misc"

  outdir_subpaths:
    - "MarPPSS"

  # prep_data
  cutwin: [-60, 60]
  rotated: true

  # prior ranges
  HRange: [1., 60.0]
  wRange: [0.5, 1.5]
  vRange: [1.0, 4.0]
  logeRange: [0., 10.]
  rhoRange: [1.5, 2.2]

  # default CD and rel. error
  useCD: false
  fitLoge: true
  fitgv: false
  fitavgvs: false
  fitrho: false
  
  # more default settings
  maxN: 1
  stdPP: 0.04 # 0.34 ~= 0.01 * exp(3.5)
  stdSS: 0.04
  
  # rjmcmc parameters
  totalSteps: 1000000
  burnInSteps: 800000
  nSaveModels: 200
  actionsPerStep: 1
  num_chains: 8

  ###################
  # event specifics #
  ###################

