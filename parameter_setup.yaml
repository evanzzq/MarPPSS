common:

  basedir: "/Users/evanzhang/zzq@umd.edu - Google Drive/My Drive/Research"
  # basedir: "H:/My Drive/Research"

  datadir_subpaths:
    - "SharpSSPy"
    - "misc"

  outdir_subpaths:
    - "MarPPSS"

  # prep_data
  cutwin: [-60, 60]
  rotated: true

  # prior ranges
  HRange: [1., 60.0]
  wRange: [0.5, 1.5]
  vRange: [4.0, 8.0]
  logeRange: [0., 10.]
  rhoRange: [1.7, 2.0]

  # default CD and rel. error
  useCD: false
  fitLoge: true
  fitgv: false
  fitavgvs: false
  fitrho: false
  
  # more default settings
  maxN: 1
  stdPP: 0.01 # 0.34 ~= 0.01 * exp(3.5)
  stdSS: 0.01
  
  # rjmcmc parameters
  totalSteps: 2000000
  burnInSteps: 1600000
  nSaveModels: 200
  actionsPerStep: 1
  num_chains: 8

  ###################
  # event specifics #
  ###################

  # S1000a
  # PPfreq: [0.2, 0.5]
  # SSfreq: [0.2, 0.5]
  # rayp: [0.0983, 0.1907]
  # PParr: "2021-09-18T18:01:49.000"
  # SSarr: "2021-09-18T18:14:05.000"

  # S0976a
  PPfreq: [0.1666666667, 0.3571428571]
  SSfreq: [0.1666666667, 0.3571428571]
  rayp: [0.08181493934, 0.1712366396]
  PParr: "2021-08-25T03:49:13.000"
  SSarr: "2021-08-25T04:03:16.000"

experiments:

  - evname: "S0976a_pzfiltered" # name of event in raw data dir
    dtype: "DISP"
    src_sigma: 3.0
    useCD: false
    fitavgvs: true
    fitgv: false
    fitLoge: false
    fitrho: true

    # prior ranges
    HRange: [1., 60.0]
    wRange: [0.5, 1.5]
    vRange: [1.5, 5.0]
    logeRange: [0., 10.]
    rhoRange: [1.7, 2.0]

    mode: 3                     # 1=PP, 2=SS, 3=joint
    maxN: 1
    stdPP: 0.005
    stdSS: 0.005
    fitRange: [2,20,10,30]
    fitLoge: true
    runname: "run1_8c_maxN1_joint_avgvs_loge"