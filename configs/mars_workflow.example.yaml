paths:
  data_root: "${MARPPSS_DATA_DIR}"
  datadir_subpaths:
    - "SharpSSPy"
    - "misc"
  outdir_subpaths:
    - "MarPPSS"

defaults:
  preprocessing:
    cutwin: [-60, 60]
    rotated: true
  prior:
    HRange: [1.0, 60.0]
    wRange: [0.5, 1.5]
    vRange: [1.0, 4.0]
    # Active when assumptions.top_layer_gradient is sqrt, linear, or all_linear.
    # sqrt units: m/s/sqrt(m), v_m/s = v0_m/s + a * sqrt(z_m).
    # linear units: m/s/m, v_m/s = v0_m/s + a * z_m.
    # all_linear uses one linear slope per finite layer.
    aRange: [0.0, 100.0]
    logeRange: [0.0, 10.0]
    rhoRange: [1.5, 2.2]
    maxN: 1
    stdPP: 0.04
    stdSS: 0.04
  inversion:
    useCD: false
    fitWaveform: true
    fitLoge: true
    fitTT: false
    fitgv: false
    fitavgvs: false
    fitrho: false
    fitRange: null
  runtime:
    totalSteps: 1000000
    burnInSteps: 800000
    nSaveModels: 200
    actionsPerStep: 1
    num_chains: 8
  assumptions:
    fixed_vpvs: 1.8
    enforce_increasing_velocity: false
    top_layer_gradient: step
    # Backward-compatible alias for top_layer_gradient: sqrt.
    top_layer_sqrt_gradient: false
    # Optional, fixed-layer travel-time inversions only.
    # One entry per supplied travel-time pick/discontinuity: inc, dec, or free.
    # velocity_transition_directions: [inc, inc, dec]
    # For top_layer_gradient: all_linear, require velocity just below each
    # discontinuity to exceed velocity just above it by at least this percent.
    # minimum_velocity_jump_percent: 5.0

